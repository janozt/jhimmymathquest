<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Aprende Matemáticas Jugando</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; overflow-x: hidden; }

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideIn { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
        @keyframes popIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes confetti { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(-200px) rotate(720deg);opacity:0} }
        @keyframes glow { 0%,100%{box-shadow:0 0 5px rgba(99,102,241,0.5)} 50%{box-shadow:0 0 20px rgba(99,102,241,0.8)} }
        @keyframes bounceIn { 0%{transform:scale(0.3);opacity:0} 50%{transform:scale(1.05)} 70%{transform:scale(0.95)} 100%{transform:scale(1);opacity:1} }
        @keyframes progressBar { from{width:0%} to{width:var(--progress)} }
        @keyframes starCollect { 0%{transform:scale(1) rotate(0deg);opacity:1} 100%{transform:scale(0) rotate(180deg) translateY(-50px);opacity:0} }
        @keyframes ripple { 0%{transform:scale(0);opacity:0.6} 100%{transform:scale(4);opacity:0} }
        @keyframes petWalk { 0%,100%{transform:translateX(0) scaleX(1)} 25%{transform:translateX(20px) scaleX(1)} 50%{transform:translateX(20px) scaleX(-1)} 75%{transform:translateX(0) scaleX(-1)} }
        @keyframes bgMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }

        .float { animation: float 3s ease-in-out infinite; }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        .slide-in { animation: slideIn 0.5s ease-out forwards; }
        .pop-in { animation: popIn 0.5s ease-out forwards; }
        .shake { animation: shake 0.5s ease-in-out; }
        .bounce-in { animation: bounceIn 0.6s ease-out forwards; }
        .glow { animation: glow 2s ease-in-out infinite; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #818cf8, #6366f1); border-radius: 10px; }

        .gradient-bg {
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
        }

        .glass {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .btn-press {
            transition: all 0.15s ease;
        }
        .btn-press:active {
            transform: scale(0.95);
        }

        .dark body { background: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

        // ==========================================
        // SOUND ENGINE
        // ==========================================
        const SoundEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                this.init();
                const c = this.ctx;
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g);
                g.connect(c.destination);
                const now = c.currentTime;
                switch(type) {
                    case 'correct':
                        o.frequency.setValueAtTime(523.25, now);
                        o.frequency.setValueAtTime(659.25, now + 0.1);
                        o.frequency.setValueAtTime(783.99, now + 0.2);
                        g.gain.setValueAtTime(0.3, now);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                        o.start(now); o.stop(now + 0.4);
                        break;
                    case 'wrong':
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(200, now);
                        o.frequency.setValueAtTime(150, now + 0.15);
                        g.gain.setValueAtTime(0.2, now);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        o.start(now); o.stop(now + 0.3);
                        break;
                    case 'click':
                        o.frequency.setValueAtTime(800, now);
                        g.gain.setValueAtTime(0.15, now);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        o.start(now); o.stop(now + 0.1);
                        break;
                    case 'levelup':
                        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                            const o2 = c.createOscillator();
                            const g2 = c.createGain();
                            o2.connect(g2); g2.connect(c.destination);
                            o2.frequency.setValueAtTime(f, now + i*0.15);
                            g2.gain.setValueAtTime(0.25, now + i*0.15);
                            g2.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.3);
                            o2.start(now + i*0.15); o2.stop(now + i*0.15 + 0.3);
                        });
                        break;
                    case 'coin':
                        o.frequency.setValueAtTime(1200, now);
                        o.frequency.setValueAtTime(1600, now + 0.05);
                        g.gain.setValueAtTime(0.2, now);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        o.start(now); o.stop(now + 0.15);
                        break;
                    case 'star':
                        [880, 1100, 1320].forEach((f, i) => {
                            const o2 = c.createOscillator();
                            const g2 = c.createGain();
                            o2.connect(g2); g2.connect(c.destination);
                            o2.type = 'sine';
                            o2.frequency.setValueAtTime(f, now + i*0.08);
                            g2.gain.setValueAtTime(0.15, now + i*0.08);
                            g2.gain.exponentialRampToValueAtTime(0.01, now + i*0.08 + 0.2);
                            o2.start(now + i*0.08); o2.stop(now + i*0.08 + 0.2);
                        });
                        break;
                }
            }
        };

        // ==========================================
        // CONTEXT
        // ==========================================
        const AppContext = createContext();

        // ==========================================
        // UTILITIES
        // ==========================================
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const pick = arr => arr[rand(0, arr.length - 1)];

        const MATH_TYPES = [
            { id: 'suma', label: 'Suma', icon: '➕', color: '#6366f1' },
            { id: 'resta', label: 'Resta', icon: '➖', color: '#ec4899' },
            { id: 'multiplicacion', label: 'Multiplicación', icon: '✖️', color: '#f59e0b' },
            { id: 'division', label: 'División', icon: '➗', color: '#10b981' },
            { id: 'logica', label: 'Lógica', icon: '🧠', color: '#8b5cf6' },
            { id: 'patrones', label: 'Patrones', icon: '🔢', color: '#06b6d4' },
            { id: 'problemas', label: 'Problemas', icon: '📝', color: '#f97316' },
            { id: 'geometria', label: 'Geometría', icon: '📐', color: '#84cc16' },
        ];

        const ACHIEVEMENTS = [
            { id: 'first_correct', name: 'Primer Acierto', icon: '🎯', desc: 'Responde tu primera pregunta', condition: (s) => s.totalCorrect >= 1 },
            { id: 'streak_5', name: 'Racha de 5', icon: '🔥', desc: '5 respuestas correctas seguidas', condition: (s) => s.bestStreak >= 5 },
            { id: 'streak_10', name: 'Racha de 10', icon: '⚡', desc: '10 respuestas correctas seguidas', condition: (s) => s.bestStreak >= 10 },
            { id: 'coins_100', name: 'Ahorrador', icon: '💰', desc: 'Acumula 100 monedas', condition: (s) => s.totalCoins >= 100 },
            { id: 'level_5', name: 'Nivel 5', icon: '⭐', desc: 'Alcanza el nivel 5', condition: (s) => s.level >= 5 },
            { id: 'level_10', name: 'Nivel 10', icon: '🌟', desc: 'Alcanza el nivel 10', condition: (s) => s.level >= 10 },
            { id: 'all_types', name: 'Explorador', icon: '🗺️', desc: 'Practica todos los tipos', condition: (s) => s.typesPracticed && s.typesPracticed.size >= 8 },
            { id: 'speed_3', name: 'Velocista', icon: '💨', desc: 'Responde en menos de 3 segundos', condition: (s) => s.fastAnswers >= 5 },
            { id: 'perfect_session', name: 'Sesión Perfecta', icon: '💎', desc: '100% en una sesión', condition: (s) => s.perfectSessions >= 1 },
            { id: 'total_50', name: 'Centenario', icon: '🎖️', desc: '50 respuestas correctas', condition: (s) => s.totalCorrect >= 50 },
        ];

        const PETS = [
            { id: 'robot', name: 'Robi', icon: '🤖', color: '#6366f1', unlockLevel: 1 },
            { id: 'cat', name: 'Michi', icon: '🐱', color: '#ec4899', unlockLevel: 3 },
            { id: 'dragon', name: 'Drago', icon: '🐉', color: '#f59e0b', unlockLevel: 5 },
            { id: 'unicorn', name: 'Uni', icon: '🦄', color: '#a855f7', unlockLevel: 8 },
            { id: 'alien', name: 'Zorp', icon: '👽', color: '#06b6d4', unlockLevel: 12 },
        ];

        const AVATAR_ITEMS = {
            hair: [
                { id: 'hair1', icon: '👦', name: 'Clásico' },
                { id: 'hair2', icon: '👧', name: 'Largo' },
                { id: 'hair3', icon: '🧑', name: 'Corto' },
                { id: 'hair4', icon: '👩‍🦱', name: 'Rizado' },
            ],
            color: [
                { id: 'blue', color: '#3b82f6', name: 'Azul' },
                { id: 'pink', color: '#ec4899', name: 'Rosa' },
                { id: 'green', color: '#22c55e', name: 'Verde' },
                { id: 'purple', color: '#8b5cf6', name: 'Morado' },
                { id: 'orange', color: '#f97316', name: 'Naranja' },
                { id: 'red', color: '#ef4444', name: 'Rojo' },
            ],
            accessory: [
                { id: 'none', icon: '😊', name: 'Ninguno' },
                { id: 'glasses', icon: '🤓', name: 'Lentes' },
                { id: 'crown', icon: '👑', name: 'Corona' },
                { id: 'hat', icon: '🎩', name: 'Sombrero' },
            ]
        };

        // ==========================================
        // MATH PROBLEM GENERATOR
        // ==========================================
        function generateProblem(type, difficulty) {
            const d = difficulty;
            let question, answer, options;

            switch(type) {
                case 'suma': {
                    const max = d <= 2 ? 10 : d <= 4 ? 50 : d <= 6 ? 100 : d <= 8 ? 500 : 1000;
                    const a = rand(1, max);
                    const b = rand(1, max);
                    answer = a + b;
                    question = `${a} + ${b} = ?`;
                    break;
                }
                case 'resta': {
                    const max = d <= 2 ? 10 : d <= 4 ? 50 : d <= 6 ? 100 : d <= 8 ? 500 : 1000;
                    const a = rand(1, max);
                    const b = rand(1, Math.min(a, max));
                    answer = a - b;
                    question = `${a} - ${b} = ?`;
                    break;
                }
                case 'multiplicacion': {
                    const max = d <= 2 ? 5 : d <= 4 ? 10 : d <= 6 ? 12 : d <= 8 ? 15 : 25;
                    const a = rand(2, max);
                    const b = rand(2, max);
                    answer = a * b;
                    question = `${a} × ${b} = ?`;
                    break;
                }
                case 'division': {
                    const max = d <= 2 ? 5 : d <= 4 ? 10 : d <= 6 ? 12 : d <= 8 ? 15 : 25;
                    const b = rand(2, max);
                    answer = rand(2, max);
                    const a = b * answer;
                    question = `${a} ÷ ${b} = ?`;
                    break;
                }
                case 'logica': {
                    const templates = [
                        () => { const a = rand(2,10); const b = rand(2,10); answer = a + b + rand(1,5); question = `Si ${a} + ${b} = ${a+b}, ¿cuánto es ${a} + ${b} + ${answer - a - b}?`; },
                        () => { const n = rand(3,9); answer = n * 2; question = `Un número multiplicado por 2 da ${answer}. ¿Cuál es el número?`; },
                        () => { const a = rand(10,50); const b = rand(1,9); answer = a + b; question = `¿Qué número sigue después de ${a} si sumamos ${b}?`; },
                        () => { const seq = [rand(1,5)]; for(let i=1;i<4;i++) seq.push(seq[i-1]+rand(2,5)); answer = seq[3]+(seq[1]-seq[0]); question = `¿Qué sigue en la secuencia: ${seq.join(', ')} ...?`; },
                    ];
                    pick(templates)();
                    break;
                }
                case 'patrones': {
                    const start = rand(1, 10);
                    const step = rand(2, 5);
                    const seq = Array.from({length: 5}, (_, i) => start + step * i);
                    answer = start + step * 5;
                    question = `¿Qué sigue en el patrón? ${seq.join(', ')}, ?`;
                    break;
                }
                case 'problemas': {
                    const names = ['Ana', 'Luis', 'María', 'Pedro', 'Sofía', 'Carlos', 'Elena', 'Diego'];
                    const items = ['manzanas', 'lápices', 'caramelos', 'galletas', 'libros', 'juguetes', 'estrellas'];
                    const name = pick(names);
                    const item = pick(items);
                    const scenarios = [
                        () => { const a = rand(3,15); const b = rand(2,10); answer = a + b; question = `${name} tiene ${a} ${item} y recibe ${b} más. ¿Cuántos tiene ahora?`; },
                        () => { const a = rand(10,25); const b = rand(1, a-1); answer = a - b; question = `${name} tenía ${a} ${item} y regaló ${b}. ¿Cuántos le quedan?`; },
                        () => { const a = rand(2,8); const b = rand(2,5); answer = a * b; question = `${name} tiene ${a} cajas con ${b} ${item} cada una. ¿Cuántos tiene en total?`; },
                    ];
                    pick(scenarios)();
                    break;
                }
                case 'geometria': {
                    const geoQuestions = [
                        () => { const s = rand(2,10); answer = s * 4; question = `¿Cuál es el perímetro de un cuadrado de lado ${s}?`; },
                        () => { const l = rand(2,8); const w = rand(2,8); answer = l * w; question = `¿Cuál es el área de un rectángulo de ${l} × ${w}?`; },
                        () => { const sides = pick([3,4,5,6,8]); answer = sides; question = `¿Cuántos lados tiene un ${sides===3?'triángulo':sides===4?'cuadrado':sides===5?'pentágono':sides===6?'hexágono':'octágono'}?`; },
                        () => { const angles = [3,4]; const n = pick(angles); answer = n; question = `¿Cuántos ángulos tiene un ${n===3?'triángulo':'cuadrado'}?`; },
                    ];
                    pick(geoQuestions)();
                    break;
                }
            }

            // Generate wrong options
            options = [answer];
            while (options.length < 4) {
                let wrong = answer + rand(-Math.max(5, Math.floor(answer * 0.3)), Math.max(5, Math.floor(answer * 0.3)));
                if (wrong < 0) wrong = rand(0, answer + 5);
                if (!options.includes(wrong) && wrong !== answer) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);

            return { question, answer, options, type };
        }

        // ==========================================
        // CONFETTI COMPONENT
        // ==========================================
        function Confetti({ active }) {
            if (!active) return null;
            const pieces = Array.from({ length: 50 }, (_, i) => ({
                id: i,
                x: rand(0, 100),
                color: pick(['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#8b5cf6', '#ef4444', '#06b6d4']),
                delay: Math.random() * 0.5,
                size: rand(6, 14),
            }));
            return (
                <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 9999 }}>
                    {pieces.map(p => (
                        <div key={p.id} style={{
                            position: 'absolute', left: `${p.x}%`, top: '-10px',
                            width: p.size, height: p.size, backgroundColor: p.color,
                            borderRadius: rand(0,1) ? '50%' : '2px',
                            animation: `confetti ${1 + Math.random()}s ease-out ${p.delay}s forwards`,
                        }} />
                    ))}
                </div>
            );
        }

        // ==========================================
        // FLOATING PARTICLES
        // ==========================================
        function FloatingParticles({ count = 15 }) {
            const particles = useMemo(() => Array.from({ length: count }, (_, i) => ({
                id: i,
                x: rand(0, 100),
                y: rand(0, 100),
                size: rand(4, 20),
                duration: rand(10, 25),
                delay: Math.random() * 5,
                opacity: 0.1 + Math.random() * 0.2,
            })), []);
            return (
                <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', overflow: 'hidden', zIndex: 0 }}>
                    {particles.map(p => (
                        <div key={p.id} style={{
                            position: 'absolute', left: `${p.x}%`, top: `${p.y}%`,
                            width: p.size, height: p.size,
                            borderRadius: '50%',
                            background: `linear-gradient(135deg, #667eea, #764ba2)`,
                            opacity: p.opacity,
                            animation: `float ${p.duration}s ease-in-out ${p.delay}s infinite`,
                        }} />
                    ))}
                </div>
            );
        }

        // ==========================================
        // PROGRESS BAR
        // ==========================================
        function ProgressBar({ value, max, color = '#6366f1', height = 12, showLabel = true }) {
            const pct = Math.min(100, (value / max) * 100);
            return (
                <div style={{ width: '100%' }}>
                    {showLabel && <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, fontSize: 12, fontWeight: 700, color: '#64748b' }}>
                        <span>{value} / {max}</span><span>{Math.round(pct)}%</span>
                    </div>}
                    <div style={{ width: '100%', height, background: '#e2e8f0', borderRadius: height/2, overflow: 'hidden' }}>
                        <div style={{
                            width: `${pct}%`, height: '100%',
                            background: `linear-gradient(90deg, ${color}, ${color}dd)`,
                            borderRadius: height/2,
                            transition: 'width 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
                            boxShadow: `0 2px 8px ${color}40`,
                        }} />
                    </div>
                </div>
            );
        }

        // ==========================================
        // XP RING
        // ==========================================
        function XPRing({ level, xp, xpToNext, size = 80 }) {
            const pct = xp / xpToNext;
            const r = (size - 8) / 2;
            const circ = 2 * Math.PI * r;
            const offset = circ * (1 - pct);
            return (
                <div style={{ position: 'relative', width: size, height: size }}>
                    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
                        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={6} />
                        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#xpGrad)" strokeWidth={6}
                            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
                            style={{ transition: 'stroke-dashoffset 0.8s ease' }} />
                        <defs><linearGradient id="xpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#6366f1" /><stop offset="100%" stopColor="#a855f7" />
                        </linearGradient></defs>
                    </svg>
                    <div style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
                        <span style={{ fontSize: size * 0.28, fontWeight: 900, color: '#6366f1' }}>{level}</span>
                        <span style={{ fontSize: size * 0.12, fontWeight: 700, color: '#94a3b8' }}>Nivel</span>
                    </div>
                </div>
            );
        }

        // ==========================================
        // PET COMPONENT
        // ==========================================
        function PetDisplay({ pet, mood = 'happy', size = 80 }) {
            const moods = {
                happy: ['😊', '😄', '🥰'],
                excited: ['🤩', '😆', '✨'],
                thinking: ['🤔', '💭', '🧐'],
                sad: ['😢', '😿', '💧'],
                sleeping: ['😴', '💤', '🌙'],
            };
            return (
                <div style={{ width: size, height: size, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.7, animation: 'float 3s ease-in-out infinite' }}>
                    {pet.icon}
                </div>
            );
        }

        // ==========================================
        // LOGIN SCREEN
        // ==========================================
        function LoginScreen({ onLogin }) {
            const [isParent, setIsParent] = useState(false);
            const [name, setName] = useState('');
            const [parentCode, setParentCode] = useState('');
            const [show, setShow] = useState(false);

            useEffect(() => { setTimeout(() => setShow(true), 100); }, []);

            const handleLogin = () => {
                if (!name.trim()) return;
                SoundEngine.play('click');
                onLogin({ name: name.trim(), isParent });
            };

            return (
                <div className="gradient-bg" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, position: 'relative', overflow: 'hidden' }}>
                    <FloatingParticles count={20} />
                    <div style={{
                        maxWidth: 500, width: '100%', position: 'relative', zIndex: 1,
                        opacity: show ? 1 : 0, transform: show ? 'translateY(0)' : 'translateY(30px)',
                        transition: 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
                    }}>
                        <div style={{ textAlign: 'center', marginBottom: 30 }}>
                            <div style={{ fontSize: 60, marginBottom: 10, animation: 'float 3s ease-in-out infinite' }}>🎓</div>
                            <h1 style={{ fontSize: 42, fontWeight: 900, color: '#fff', textShadow: '0 4px 20px rgba(0,0,0,0.2)' }}>
                                Math<span style={{ color: '#fbbf24' }}>Quest</span>
                            </h1>
                            <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: 18, fontWeight: 600, marginTop: 8 }}>
                                ¡Aprende matemáticas jugando! 🚀
                            </p>

        // ==========================================
        // EXERCISE SESSION
        // ==========================================
        function ExerciseSession({ user, stats, onFinish, difficulty: initDiff }) {
            const [currentQ, setCurrentQ] = useState(0);
            const [difficulty, setDifficulty] = useState(initDiff || Math.max(1, Math.ceil(user.level / 2)));
            const [selectedType, setSelectedType] = useState(null);
            const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0, total: 0, streak: 0, coins: 0, startTime: Date.now() });
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showFeedback, setShowFeedback] = useState(null);
            const [problem, setProblem] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);
            const [timeLeft, setTimeLeft] = useState(900); // 15 minutes
            const [sessionComplete, setSessionComplete] = useState(false);
            const [adaptiveDifficulty, setAdaptiveDifficulty] = useState({});
            const questionRef = useRef(null);

            const totalQuestions = 15;

            const generateNextProblem = useCallback(() => {
                let type;
                if (selectedType) {
                    type = selectedType;
                } else {
                    type = pick(MATH_TYPES).id;
                }
                setProblem(generateProblem(type, difficulty));
            }, [difficulty, selectedType]);

            useEffect(() => {
                if (currentQ < totalQuestions && !sessionComplete) {
                    generateNextProblem();
                }
            }, [currentQ, generateNextProblem, sessionComplete]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(t => {
                        if (t <= 1) {
                            setSessionComplete(true);
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (sessionStats.correct >= totalQuestions) {
                    setSessionComplete(true);
                }
            }, [sessionStats.correct]);

            const handleAnswer = (answer) => {
                if (showFeedback !== null) return;
                setSelectedAnswer(answer);
                const isCorrect = answer === problem.answer;
                const timeTaken = (Date.now() - sessionStats.startTime) / 1000;

                SoundEngine.play(isCorrect ? 'correct' : 'wrong');

                if (isCorrect) {
                    setShowConfetti(true);
                    setTimeout(() => setShowConfetti(false), 2000);
                }

                setShowFeedback(isCorrect);

                const xpGain = isCorrect ? (difficulty * 10 + (sessionStats.streak >= 3 ? 5 : 0)) : 2;
                const coinGain = isCorrect ? (difficulty * 2 + (sessionStats.streak >= 5 ? 3 : 0)) : 0;

                setSessionStats(s => ({
                    ...s,
                    correct: s.correct + (isCorrect ? 1 : 0),
                    wrong: s.wrong + (isCorrect ? 0 : 1),
                    total: s.total + 1,
                    streak: isCorrect ? s.streak + 1 : 0,
                    coins: s.coins + coinGain,
                }));

                // Adaptive difficulty
                setAdaptiveDifficulty(d => {
                    const key = problem.type;
                    const newD = { ...d, [key]: { ...(d[key] || { correct: 0, total: 0 }), total: (d[key]?.total || 0) + 1, correct: (d[key]?.correct || 0) + (isCorrect ? 1 : 0) } };
                    const typeStats = newD[key];
                    if (typeStats.total >= 3) {
                        const accuracy = typeStats.correct / typeStats.total;
                        if (accuracy > 0.8 && difficulty < 10) setDifficulty(diff => Math.min(10, diff + 1));
                        if (accuracy < 0.4 && difficulty > 1) setDifficulty(diff => Math.max(1, diff - 1));
                    }
                    return newD;
                });

                setTimeout(() => {
                    setShowFeedback(null);
                    setSelectedAnswer(null);
                    setCurrentQ(c => c + 1);
                }, 1200);
            };

            const endSession = () => {
                const timeSpent = Math.round((Date.now() - sessionStats.startTime) / 1000);
                onFinish({
                    ...sessionStats,
                    timeSpent,
                    difficulty,
                    total: Math.max(sessionStats.total, currentQ),
                });
            };

            if (sessionComplete) {
                const accuracy = sessionStats.total > 0 ? Math.round((sessionStats.correct / sessionStats.total) * 100) : 0;
                const xpEarned = sessionStats.correct * difficulty * 10;
                return (
                    <div style={{
                        minHeight: '100vh',
                        background: 'linear-gradient(135deg, #f0f4ff, #faf5ff)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
                    }}>
                        <Confetti active={true} />
                        <div className="bounce-in" style={{
                            background: '#fff', borderRadius: 24, padding: 32, maxWidth: 400, width: '100%',
                            textAlign: 'center', boxShadow: '0 25px 60px rgba(0,0,0,0.12)',
                        }}>
                            <div style={{ fontSize: 64, marginBottom: 16, animation: 'float 2s ease-in-out infinite' }}>
                                {accuracy >= 80 ? '🏆' : accuracy >= 50 ? '⭐' : '💪'}
                            </div>
                            <h2 style={{ fontSize: 28, fontWeight: 900, color: '#1e293b', marginBottom: 8 }}>
                                {accuracy >= 80 ? '¡Increíble!' : accuracy >= 50 ? '¡Muy Bien!' : '¡Sigue Practicando!'}
                            </h2>
                            <p style={{ color: '#64748b', fontWeight: 600, marginBottom: 24 }}>
                                Sesión completada
                            </p>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 24 }}>
                                {[
                                    { label: 'Correctas', value: `${sessionStats.correct}/${sessionStats.total}`, icon: '✅' },
                                    { label: 'Precisión', value: `${accuracy}%`, icon: '🎯' },
                                    { label: 'XP Ganados', value: `+${xpEarned}`, icon: '⭐' },
                                    { label: 'Monedas', value: `+${sessionStats.coins}`, icon: '🪙' },
                                ].map((s, i) => (
                                    <div key={i} style={{
                                        background: '#f8fafc', borderRadius: 14, padding: 14,
                                    }}>
                                        <div style={{ fontSize: 24 }}>{s.icon}</div>
                                        <div style={{ fontWeight: 800, fontSize: 18, color: '#1e293b' }}>{s.value}</div>
                                        <div style={{ fontSize: 11, color: '#94a3b8', fontWeight: 600 }}>{s.label}</div>
                                    </div>
                                ))}
                            </div>

                            <button onClick={endSession} className="btn-press"
                                style={{
                                    width: '100%', padding: '16px', borderRadius: 16, border: 'none',
                                    background: 'linear-gradient(135deg, #6366f1, #8b5cf6)',
                                    color: '#fff', fontSize: 17, fontWeight: 800, cursor: 'pointer',
                                    fontFamily: 'Nunito', boxShadow: '0 8px 25px rgba(99,102,241,0.4)',

                        <button onClick={endSession} style={{
                            background: '#f1f5f9', border: 'none', borderRadius: 10,
                            padding: '8px 14px', cursor: 'pointer', fontWeight: 700,
                            color: '#64748b', fontSize: 13, fontFamily: 'Nunito',
                        }}>✕ Salir</button>

                        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                <span>🔥</span>
                                <span style={{ fontWeight: 800, color: '#f59e0b', fontSize: 14 }}>{sessionStats.streak}</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                <span>🪙</span>
                                <span style={{ fontWeight: 800, color: '#6366f1', fontSize: 14 }}>{sessionStats.coins}</span>
                            </div>
                        </div>

                        <div style={{
                            background: timeLeft < 60 ? '#fef2f2' : '#f0fdf4',
                            borderRadius: 10, padding: '6px 14px',
                            fontWeight: 800, fontSize: 14,
                            color: timeLeft < 60 ? '#ef4444' : '#22c55e',
                        }}>
                            ⏱️ {mins}:{secs.toString().padStart(2, '0')}
                        </div>
                    </div>

                    {/* Progress */}
                    <div style={{ padding: '8px 20px', background: '#fff' }}>
                        <ProgressBar value={currentQ} max={totalQuestions} color="#6366f1" height={8} showLabel={false} />
                    </div>

                    {/* Question */}
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 20, maxWidth: 600, margin: '0 auto', width: '100%' }}>
                        <div className={`slide-up ${showFeedback === false ? 'shake' : ''}`} style={{
                            width: '100%', marginBottom: 30, textAlign: 'center',
                        }}>
                            <div style={{
                                display: 'inline-flex', alignItems: 'center', gap: 6,
                                background: problem ? `${MATH_TYPES.find(t => t.id === problem.type)?.color}15` : '#f1f5f9',
                                borderRadius: 20, padding: '6px 16px', marginBottom: 16,
                            }}>
                                <span style={{ fontSize: 16 }}>{problem ? MATH_TYPES.find(t => t.id === problem.type)?.icon : ''}</span>
                                <span style={{ fontWeight: 700, fontSize: 13, color: problem ? MATH_TYPES.find(t => t.id === problem.type)?.color : '#64748b' }}>
                                    Pregunta {currentQ + 1} de {totalQuestions}
                                </span>
                            </div>
                            <div style={{
                                fontSize: 32, fontWeight: 800, color: '#1e293b',
                                padding: '20px 30px', background: '#fff', borderRadius: 20,
                                boxShadow: '0 4px 15px rgba(0,0,0,0.06)',
                                lineHeight: 1.4,
                            }}>
                                {problem?.question}
                            </div>
                        </div>

                        {/* Answers */}
                        <div style={{
                            display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12,
                            width: '100%', maxWidth: 400,
                        }}>
                            {problem?.options.map((opt, i) => {
                                const isSelected = selectedAnswer === opt;
                                const isCorrect = opt === problem.answer;
                                const showResult = showFeedback !== null;

                                let bgColor = '#fff';
                                let borderColor = '#e2e8f0';
                                let textColor = '#1e293b';

                                if (showResult) {
                                    if (isCorrect) { bgColor = '#dcfce7'; borderColor = '#22c55e'; textColor = '#166534'; }
                                    else if (isSelected) { bgColor = '#fef2f2'; borderColor = '#ef4444'; textColor = '#991b1b'; }
                                }

                                return (
                                    <button key={i} className="btn-press"
                                        onClick={() => handleAnswer(opt)}
                                        disabled={showFeedback !== null}
                                        style={{
                                            padding: '18px', borderRadius: 16,
                                            border: `3px solid ${borderColor}`,
                                            background: bgColor,
                                            color: textColor,
                                            fontSize: 22, fontWeight: 800,
                                            cursor: showFeedback !== null ? 'default' : 'pointer',
                                            fontFamily: 'Nunito',
                                            transition: 'all 0.3s',
                                            transform: isSelected ? 'scale(0.95)' : 'scale(1)',
                                        }}>
                                        {opt}
                                        {showResult && isCorrect && <span style={{ marginLeft: 8 }}>✓</span>}
                                        {showResult && isSelected && !isCorrect && <span style={{ marginLeft: 8 }}>✗</span>}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Feedback Message */}
                        {showFeedback !== null && (
                            <div className="pop-in" style={{
                                marginTop: 20, padding: '12px 24px', borderRadius: 14,
                                background: showFeedback ? '#dcfce7' : '#fef2f2',
                                fontWeight: 700, fontSize: 16,
                                color: showFeedback ? '#166534' : '#991b1b',
                            }}>
                                {showFeedback ? '¡Correcto! 🎉' : `La respuesta era ${problem.answer} 💪`}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // MINI-GAME (Quick Math Race)
        // ==========================================
        function MiniGame({ onClose, onReward }) {
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(30);
            const [problem, setProblem] = useState(null);
            const [started, setStarted] = useState(false);
            const [finished, setFinished] = useState(false);

            const generate = () => {
                const a = rand(1, 12);
                const b = rand(1, 12);
                const ops = ['+', '-', '×'];
                const op = pick(ops);
                let ans;
                switch(op) {
                    case '+': ans = a + b; break;
                    case '-': ans = Math.abs(a - b); break;
                    case '×': ans = a * b; break;
                }
                setProblem({ text: `${a} ${op} ${b}`, answer: ans });
            };

            useEffect(() => {
                if (started && !finished) generate();
            }, [started, finished]);

            useEffect(() => {
                if (!started || finished) return;
                const t = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) { setFinished(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(t);
            }, [started, finished]);

            const handleAnswer = (val) => {
                if (val === problem.answer) {
                    SoundEngine.play('correct');
                    setScore(s => s + 1);
                    generate();
                } else {
                    SoundEngine.play('wrong');
                    setTimeLeft(t => Math.max(0, t - 2));
                }
            };

            if (finished) {
                onReward(score);
                return (
                    <div style={{
                        position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',
                        background: 'linear-gradient(135deg, #6366f1, #8b5cf6)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
                    }}>
                        <Confetti active={score > 5} />
                        <div className="bounce-in" style={{
                            background: '#fff', borderRadius: 24, padding: 32, maxWidth: 350, width: '100%',
                            textAlign: 'center',
                        }}>
                            <div style={{ fontSize: 64, marginBottom: 16 }}>🏁</div>
                            <h2 style={{ fontSize: 28, fontWeight: 900, color: '#1e293b' }}>¡Tiempo!</h2>
                            <div style={{ fontSize: 48, fontWeight: 900, color: '#6366f1', margin: '16px 0' }}>{score}</div>
                            <p style={{ color: '#64748b', fontWeight: 600 }}>Respuestas correctas</p>
                            <p style={{ color: '#f59e0b', fontWeight: 800, marginTop: 8 }}>
                                +{score * 5} 🪙 monedas ganadas
                            </p>
                            <button onClick={onClose} className="btn-press" style={{
                                marginTop: 20, padding: '14px 32px', borderRadius: 14, border: 'none',
                                background: 'linear-gradient(135deg, #6366f1, #8b5cf6)',
                                color: '#fff', fontSize: 16, fontWeight: 800, cursor: 'pointer',
                                fontFamily: 'Nunito',
                            }}>Volver</button>
                        </div>
                    </div>
                );
            }

            if (!started) {
                return (
                    <div style={{
                        position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',
                        background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
                    }} onClick={onClose}>
                        <div style={{
                            background: '#fff', borderRadius: 24, padding: 32, maxWidth: 400, width: '100%',
                            textAlign: 'center',
                        }} onClick={e => e.stopPropagation()}>
                            <div style={{ fontSize: 64, marginBottom: 16 }}>⚡</div>
                            <h2 style={{ fontSize: 28, fontWeight: 900, color: '#1e293b', marginBottom: 8 }}>Carrera Matemática</h2>
                            <p style={{ color: '#64748b', fontWeight: 600, marginBottom: 24 }}>
                                ¡Resuelve el mayor número de operaciones en 30 segundos!
                            </p>
                            <div style={{ display: 'flex', gap: 10 }}>
                                <button onClick={onClose} style={{
                                    flex: 1, padding: '14px', borderRadius: 14, border: '2px solid #e2e8f0',
                                    background: '#fff', color: '#64748b', fontWeight: 700, fontSize: 15,
                                    cursor: 'pointer', fontFamily: 'Nunito',
                                }}>Cancelar</button>
                                <button onClick={() => setStarted(true)} className="btn-press" style={{
                                    flex: 2, padding: '14px', borderRadius: 14, border: 'none',
                                    background: 'linear-gradient(135deg, #6366f1, #8b5cf6)',
                                    color: '#fff', fontSize: 16, fontWeight: 800, cursor: 'pointer',
                                    fontFamily: 'Nunito',
                                    boxShadow: '0 4px 15px rgba(99,102,241,0.3)',
                                }}>¡Jugar!</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{
                    position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',
                    background: 'linear-gradient(135deg, #fef3c7, #fde68a)',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                }}>
                    <div style={{
                        position: 'absolute', top: 16, left: 16, right: 16,
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    }}>
                        <button onClick={onClose} style={{
                            background: 'rgba(255,255,255,0.8)', border: 'none', borderRadius: 10,
                            padding: '8px 14px', cursor: 'pointer', fontWeight: 700, fontSize: 13,
                        }}>✕ Salir</button>
                        <div style={{ display: 'flex', gap: 16 }}>
                            <span style={{ fontWeight: 800, color: '#92400e' }}>⭐ {score}</span>
                            <span style={{ fontWeight: 800, color: timeLeft < 10 ? '#ef4444' : '#92400e' }}>⏱️ {timeLeft}s</span>
                        </div>
                    </div>

                    <div style={{ textAlign: 'center' }}>
                        <div style={{
                            fontSize: 40, fontWeight: 900, color: '#1e293b',
                            padding: '20px 40px', background: 'rgba(255,255,255,0.8)',
                            borderRadius: 20, marginBottom: 24,
                        }}>
                            {problem?.text} = ?
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, maxWidth: 300 }}>
                            {(() => {
                                const opts = [problem?.answer];
                                while(opts.length < 4) {
                                    const w = problem.answer + rand(-10, 10);
                                    if(!opts.includes(w) && w >= 0) opts.push(w);
                                }
                                opts.sort(() => Math.random() - 0.5);
                                return opts.map((o, i) => (
                                    <button key={i} className="btn-press" onClick={() => handleAnswer(o)}
                                        style={{
                                            padding: '16px', borderRadius: 14, border: '3px solid rgba(255,255,255,0.8)',
                                            background: '#fff', fontSize: 24, fontWeight: 800, cursor: 'pointer',
                                            fontFamily: 'Nunito', color: '#1e293b',
                                            boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
                                        }}>{o}</button>
                                ));
                            })()}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MAIN APP
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [screen, setScreen] = useState('login'); // login, dashboard, exercise, rewards, parent, minigame
            const [stats, setStats] = useState({
                totalXP: 0, totalCoins: 0, totalCorrect: 0, totalWrong: 0,
                totalAttempts: 0, bestStreak: 0, dailyStreak: 1,
                totalTime: 0, todayTime: 0, perfectSessions: 0,
                fastAnswers: 0, typesPracticed: new Set(),
                typeStats: {},
            });
            const [avatar, setAvatar] = useState({ hair: 'hair1', color: 'blue', accessory: 'none' });
            const [showAvatarCustomizer, setShowAvatarCustomizer] = useState(false);

            // Load from localStorage
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('mathquest_user');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.user) setUser(data.user);
                        if (data.stats) {
                            setStats(s => ({ ...s, ...data.stats, typesPracticed: new Set(data.stats.typesPracticed || []) }));
                        }
                        if (data.avatar) setAvatar(data.avatar);
                    }
                } catch(e) {}
            }, []);

            // Save to localStorage
            useEffect(() => {
                if (user) {
                    localStorage.setItem('mathquest_user', JSON.stringify({
                        user, stats: { ...stats, typesPracticed: [...stats.typesPracticed] }, avatar,
                    }));
                }
            }, [user, stats, avatar]);

            const handleLogin = (loginData) => {
                const existing = localStorage.getItem('mathquest_user');
                if (existing) {
                    const data = JSON.parse(existing);
                    setUser({ ...data.user, name: loginData.name, isParent: loginData.isParent });
                    setStats(s => ({ ...s, ...data.stats, typesPracticed: new Set(data.stats?.typesPracticed || []) }));
                    setAvatar(data.avatar || avatar);
                } else {
                    setUser({ name: loginData.name, isParent: loginData.isParent, level: 1, pet: 'robot', avatar });
                }
                setScreen('dashboard');
            };

            const handleFinishSession = (sessionStats) => {
                const xpGain = sessionStats.correct * 10;
                const accuracy = sessionStats.total > 0 ? sessionStats.correct / sessionStats.total : 0;

                setStats(s => {
                    const newTypes = new Set(s.typesPracticed);
                    // Track type stats
                    const newTypeStats = { ...s.typeStats };
                    const type = MATH_TYPES.find(t => t.id === (sessionStats.type || 'suma'));

                    newTypes.add(type?.id || 'suma');
                    if (!newTypeStats[type?.id || 'suma']) newTypeStats[type?.id || 'suma'] = { correct: 0, total: 0 };
                    newTypeStats[type?.id || 'suma'].correct += sessionStats.correct;
                    newTypeStats[type?.id || 'suma'].total += sessionStats.total;

                    const newTotalXP = s.totalXP + xpGain;
                    const newLevel = Math.floor(newTotalXP / 100) + 1;

                    return {
                        ...s,
                        totalXP: newTotalXP,
                        totalCoins: s.totalCoins + sessionStats.coins,
                        totalCorrect: s.totalCorrect + sessionStats.correct,
                        totalWrong: s.totalWrong + sessionStats.wrong,
                        totalAttempts: s.totalAttempts + sessionStats.total,
                        bestStreak: Math.max(s.bestStreak, sessionStats.streak),
                        totalTime: s.totalTime + sessionStats.timeSpent,
                        todayTime: (s.todayTime || 0) + sessionStats.timeSpent,
                        perfectSessions: s.perfectSessions + (accuracy === 1 ? 1 : 0),
                        fastAnswers: s.fastAnswers + (sessionStats.timeSpent / sessionStats.total < 5 ? 1 : 0),
                        typesPracticed: newTypes,
                        typeStats: newTypeStats,
                    };
                });

                setUser(u => ({
                    ...u,
                    level: Math.floor((u.level === 1 ? 0 : (stats.totalXP / 100)) + (sessionStats.correct * 10 / 100)) + 1,
                }));

                SoundEngine.play('levelup');
                setScreen('dashboard');
            };

            const handleMiniGameReward = (score) => {
                const coins = score * 5;
                const xp = score * 10;
                setStats(s => ({
                    ...s,
                    totalCoins: s.totalCoins + coins,
                    totalXP: s.totalXP + xp,
                    totalCorrect: s.totalCorrect + score,
                    totalAttempts: s.totalAttempts + score,
                }));
            };

            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <>
                    {screen === 'dashboard' && (
                        <Dashboard
                            user={user} stats={stats}
                            onStartSession={(isDaily, type) => setScreen('exercise')}
                            onViewRewards={() => setScreen('rewards')}
                            onViewParent={() => setScreen('parent')}
                            onCustomizeAvatar={() => setShowAvatarCustomizer(true)}
                            onLogout={() => { setUser(null); setScreen('login'); }}
                        />
                    )}

                    {screen === 'exercise' && (
                        <ExerciseSession
                            user={user} stats={stats}
                            onFinish={handleFinishSession}
                        />
                    )}

                    {screen === 'rewards' && (
                        <>
                            <Dashboard
                                user={user} stats={stats}
                                onStartSession={() => setScreen('exercise')}
                                onViewRewards={() => {}}
                                onViewParent={() => setScreen('parent')}
                                onCustomizeAvatar={() => setShowAvatarCustomizer(true)}
                                onLogout={() => { setUser(null); setScreen('login'); }}
                            />
                            <RewardsScreen stats={stats} user={user} onClose={() => setScreen('dashboard')} />
                        </>
                    )}

                    {screen === 'parent' && (
                        <>
                            <Dashboard
                                user={user} stats={stats}
                                onStartSession={() => setScreen('exercise')}
                                onViewRewards={() => setScreen('rewards')}
                                onViewParent={() => {}}
                                onCustomizeAvatar={() => setShowAvatarCustomizer(true)}
                                onLogout={() => { setUser(null); setScreen('login'); }}
                            />
                            <ParentPanel stats={stats} user={user} onClose={() => setScreen('dashboard')} />
                        </>
                    )}

                    {screen === 'minigame' && (
                        <MiniGame
                            onClose={() => setScreen('dashboard')}
                            onReward={handleMiniGameReward}
                        />
                    )}

                    {showAvatarCustomizer && (
                        <AvatarCustomizer
                            avatar={avatar}
                            onSave={setAvatar}
                            onClose={() => setShowAvatarCustomizer(false)}
                        />
                    )}
                </>
            );
        }

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
